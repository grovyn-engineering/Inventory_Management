{% extends "base.html" %}

{% block title %}Cart{% endblock %}

{% block head_extra %}
<style>
    #client-messages {
        display: grid;
        gap: 10px;
        margin-bottom: 16px;
    }

    .cart-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
    }

    .cart-table th,
    .cart-table td {
        padding: 10px 8px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: middle;
    }

    .cart-image {
        width: 52px;
        height: 52px;
        border-radius: 8px;
        object-fit: contain;
        background: linear-gradient(135deg, #e2e8f0, #f8fafc);
        display: block;
    }

    .cart-actions {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .qty-btn {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 3px 8px;
        cursor: pointer;
        line-height: 1.1;
    }

    .qty-btn:hover {
        background: var(--surface-muted);
    }

    .qty-controls {
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .qty-value {
        min-width: 24px;
        text-align: center;
        font-weight: 600;
    }

    .remove-btn {
        border: 1px solid #dc2626;
        border-radius: 6px;
        background: #fff;
        color: #dc2626;
        padding: 5px 10px;
        cursor: pointer;
        font-size: 12px;
    }

    .remove-btn:hover {
        background: #fee2e2;
    }

    .cart-footer {
        margin-top: 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .cart-total {
        font-size: 18px;
        font-weight: 700;
    }
</style>
{% endblock %}

{% block content %}
<div id="client-messages"></div>

<section class="card">
    <h2 style="margin: 0;">Cart</h2>
    <div class="muted" style="margin-top: 4px;">{{ location_name }}</div>
</section>

<section class="card" style="margin-top: 14px;">
    <table class="cart-table">
        <thead>
            <tr>
                <th>Image</th>
                <th>Product</th>
                <th>Variant</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Total</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="cart-body">
            <tr>
                <td colspan="7" class="muted">No items in cart.</td>
            </tr>
        </tbody>
    </table>

    <div class="cart-footer">
        <a href="{% url orders_page_url %}">
            <button type="button" class="btn-ghost">Back to Orders</button>
        </a>
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="cart-total" id="cart-total">&#8377;0.00</div>
            <button type="button" id="proceed-btn">Proceed to Pay</button>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
(() => {
    const cartStorageKey = "orders_cart_v1";
    const cartBody = document.getElementById("cart-body");
    const cartTotal = document.getElementById("cart-total");
    const proceedButton = document.getElementById("proceed-btn");
    const messageStack = document.getElementById("client-messages");
    const razorpayKeyId = "{{ razorpay_key_id|escapejs }}";
    const ordersPageUrl = "{% url orders_page_url %}";
    const userName = "{{ request.user.get_full_name|default:request.user.username|escapejs }}";
    const userEmail = "{{ request.user.email|escapejs }}";
    let inFlight = false;
    console.log(window.Razorpay);

    const formatAmount = (amount) => `\u20B9${(Number(amount) || 0).toFixed(2)}`;

    const showMessage = (message, type = "error") => {
        const notice = document.createElement("div");
        notice.className = `notice ${type === "error" ? "error" : ""}`;
        notice.textContent = message;
        messageStack.innerHTML = "";
        messageStack.appendChild(notice);
    };

    const asNumber = (value, fallback = 0) => {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : fallback;
    };

    const normalizedVariantId = (value) => {
        if (value === null || value === undefined || value === "") {
            return null;
        }
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : null;
    };

    const mapCartForBackend = (cart) => (
        (Array.isArray(cart) ? cart : []).map((item) => ({
            product_id: asNumber(item.product_id || item.productId),
            variant_id: normalizedVariantId(item.variant_id || item.variantId),
            quantity: asNumber(item.quantity || item.qty, 1),
        }))
    );

    const loadCart = () => {
        try {
            return JSON.parse(sessionStorage.getItem(cartStorageKey)) || [];
        } catch {
            return [];
        }
    };

    const saveCart = (items) => {
        sessionStorage.setItem(cartStorageKey, JSON.stringify(items));
    };

    const clearCart = () => {
        sessionStorage.setItem(cartStorageKey, JSON.stringify([]));
    };

    const getCookie = (name) => {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        return parts.length === 2 ? parts.pop().split(";").shift() : "";
    };

    const syncCartWithBackend = async (cart) => {
        await fetch("/api/orders/cart/sync/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken"),
            },
            credentials: "same-origin",
            body: JSON.stringify({ items: mapCartForBackend(cart) }),
        });
    };

    const removeCartItemFromBackend = async (item) => {
        const response = await fetch("/api/orders/cart/remove-item/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken"),
            },
            credentials: "same-origin",
            body: JSON.stringify({
                product_id: asNumber(item.product_id || item.productId),
                variant_id: normalizedVariantId(item.variant_id || item.variantId),
            }),
        });
        const payload = await response.json();
        if (!response.ok || !payload.success) {
            throw new Error(payload.message || "Unable to remove cart item.");
        }
    };

    const cartGrandTotal = (cart) =>
        cart.reduce((sum, item) =>
            sum + Number(item.price || 0) * Number(item.quantity || item.qty || 0), 0);

    // 🔥 FIXED PAYLOAD
    const payloadItems = () => {
    const cart = loadCart();

    console.log("CART DATA:", cart);

    if (!cart.length) {
        throw new Error("Cart is empty");
    }

        return cart.map((item) => {
            const productId = Number(item.product_id || item.productId);
            const variantId = normalizedVariantId(item.variant_id || item.variantId);
            const quantity = Number(item.quantity || item.qty);

            if (!productId || !quantity) {
                console.error("INVALID ITEM:", item);
                throw new Error("Missing product_id / quantity");
            }

        return {
            product_id: productId,   // ✅ ADD THIS
            variant_id: variantId,
            quantity: quantity,
        };
    });
};

    const selectedLocationId = () => {
        const cart = loadCart();
        return cart.length ? Number(cart[0].location_id || 0) : null;
    };

    const validateCartLocation = () => {
        const cart = loadCart();
        const locationId = selectedLocationId();
        cart.forEach((item) => {
            if (Number(item.location_id || 0) !== Number(locationId || 0)) {
                throw new Error("Cart contains items from different location");
            }
        });
    };

    // 🔥 FIXED createOrder
    const createOrder = async () => {
        validateCartLocation();

        const bodyData = {
            items: payloadItems(),
            payment_method: "upi",
            location_id: selectedLocationId(),
        };

        console.log("SENDING BODY:", bodyData); // DEBUG

        const response = await fetch("/api/orders/create-order/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken"),
            },
            credentials: "same-origin",
            body: JSON.stringify(bodyData),
        });

        const payload = await response.json();

        console.log("CREATE ORDER RESPONSE:", payload); // DEBUG

        if (!response.ok || !payload.success) {
            throw new Error(payload.error || payload.message || "Unable to create order.");
        }

        const data = payload.data || {};

        // 🔥 CRITICAL FIX
        const razorpayOrderId = String(data.id || "");
        if (!/^order_[A-Za-z0-9]+$/.test(razorpayOrderId)) {
            throw new Error("Invalid Razorpay order ID");
        }

        const amountPaise = Number(data.amount ?? 0);

        if (!Number.isInteger(amountPaise) || amountPaise <= 0) {
            throw new Error("Invalid amount received from server");
        }

        return {
            id: razorpayOrderId,
            amount: amountPaise,
            currency: data.currency || "INR",
        };
    };

    const verifyPayment = async (paymentResponse, _orderId) => {
        const response = await fetch("/api/orders/verify-payment/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCookie("csrftoken"),
            },
            credentials: "same-origin",
            body: JSON.stringify({
                razorpay_order_id: paymentResponse.razorpay_order_id,
                razorpay_payment_id: paymentResponse.razorpay_payment_id,
                razorpay_signature: paymentResponse.razorpay_signature,
                payment_method: "upi",
            }),
        });

        const payload = await response.json();
        console.log("VERIFY RESPONSE:", payload);

        if (!response.ok || !payload.success) {
            throw new Error(payload.error || payload.message || "Payment verification failed.");
        }
    };

   const openRazorpay = (orderData) => {
    if (!window.Razorpay) throw new Error("Razorpay SDK failed to load");
    if (!razorpayKeyId) throw new Error("Razorpay key not configured.");
    console.log(orderData);
    console.log("ORDER DATA:", orderData);

    const options = {
        key: razorpayKeyId,
        amount: orderData.amount,
        currency: "INR",
        name: "Inventory App",
        description: "Order Payment",
        order_id: orderData.id,

        prefill: {
            name: userName,
            email: userEmail,
        },

        // 🔥 VERY IMPORTANT ADD THIS

        handler: async function (response) {
            console.log("🔥 PAYMENT SUCCESS:", response);

            try {
                await verifyPayment(response, orderData.order_id);

                clearCart();
                renderCart();

                window.location.href = ordersPageUrl;

            } catch (error) {
                console.error("VERIFY ERROR:", error);
                showMessage(error.message, "error");
            }
        },

        modal: {
            ondismiss: function () {
                console.log("Payment popup closed");
            }
        },

        theme: {
            color: "#3399cc"
        }
    };

    const rzp = new Razorpay(options);

    // 🔥 ADD THIS (prevents unwanted redirect behavior)
    rzp.on('payment.failed', function (response) {
        console.error("PAYMENT FAILED:", response);
        showMessage("Payment failed", "error");
    });

    rzp.open();
};
    const proceedToPay = async () => {
        if (inFlight) return;

        if (!loadCart().length) {
            showMessage("Cart is empty");
            return;
        }
        try {
            validateCartLocation();
        } catch (error) {
            showMessage(error.message, "error");
            return;
        }

        inFlight = true;
        proceedButton.disabled = true;

        try {
            const orderData = await createOrder();
            if (!window.Razorpay) throw new Error("Razorpay SDK failed to load");
            if (!razorpayKeyId) throw new Error("Razorpay key not configured.");
            if (!/^order_[A-Za-z0-9]+$/.test(orderData.id)) throw new Error("Invalid Razorpay order ID.");

            console.log(orderData);
            console.log("ORDER DATA:", orderData);

            openRazorpay(orderData);
        } catch (error) {
            showMessage(error.message);
        } finally {
            inFlight = false;
            proceedButton.disabled = loadCart().length === 0;
        }
    };

    document.getElementById("proceed-btn").addEventListener("click", async function (event) {
        event.preventDefault();
        await proceedToPay();
    });

    const removeItemFromCart = async (index) => {
        const cart = loadCart();
        const item = cart[index];
        if (!item) {
            return;
        }

        try {
            await removeCartItemFromBackend(item);
            const updatedCart = cart.filter((_, idx) => idx !== index);
            saveCart(updatedCart);
            renderCart();
        } catch (error) {
            showMessage(error.message, "error");
        }
    };

    const updateItemQuantity = async (index, delta) => {
        const cart = loadCart();
        const item = cart[index];
        if (!item) {
            return;
        }

        const currentQuantity = Number(item.quantity || item.qty || 1);
        const nextQuantity = currentQuantity + Number(delta || 0);
        if (nextQuantity < 1) {
            return;
        }

        const updatedCart = cart.map((entry, idx) => {
            if (idx !== index) {
                return entry;
            }
            return {
                ...entry,
                quantity: nextQuantity,
                qty: nextQuantity,
            };
        });

        saveCart(updatedCart);
        renderCart();
        try {
            await syncCartWithBackend(updatedCart);
        } catch (_error) {}
    };

    const renderCart = () => {
        const cart = loadCart();

        if (!cart.length) {
            cartBody.innerHTML = '<tr><td colspan="7">No items</td></tr>';
            cartTotal.textContent = formatAmount(0);
            proceedButton.disabled = true;
            return;
        }

        cartBody.innerHTML = cart.map((item, index) => {
            const quantity = Number(item.quantity || item.qty || 1);
            return `
            <tr>
                <td><img class="cart-image" src="${item.image_url || ''}"></td>
                <td>${item.product_name}</td>
                <td>${item.variant_name}</td>
                <td>
                    <div class="qty-controls">
                        <button type="button" class="qty-btn" data-decrement-index="${index}">-</button>
                        <span class="qty-value">${quantity}</span>
                        <button type="button" class="qty-btn" data-increment-index="${index}">+</button>
                    </div>
                </td>
                <td>${formatAmount(item.price)}</td>
                <td>${formatAmount(item.price * quantity)}</td>
                <td>
                    <button type="button" class="remove-btn" data-remove-index="${index}">Remove</button>
                </td>
            </tr>
        `;
        }).join("");

        cartBody.querySelectorAll("[data-decrement-index]").forEach((button) => {
            button.addEventListener("click", () => {
                const index = Number(button.getAttribute("data-decrement-index"));
                updateItemQuantity(index, -1);
            });
        });

        cartBody.querySelectorAll("[data-increment-index]").forEach((button) => {
            button.addEventListener("click", () => {
                const index = Number(button.getAttribute("data-increment-index"));
                updateItemQuantity(index, 1);
            });
        });

        cartBody.querySelectorAll("[data-remove-index]").forEach((button) => {
            button.addEventListener("click", () => {
                const index = Number(button.getAttribute("data-remove-index"));
                removeItemFromCart(index);
            });
        });

        cartTotal.textContent = formatAmount(cartGrandTotal(cart));
        proceedButton.disabled = false;
    };

    syncCartWithBackend(loadCart()).catch(() => {});
    renderCart();
})();
</script>
{% endblock %}
