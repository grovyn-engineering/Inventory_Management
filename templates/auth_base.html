<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sign In{% endblock %}</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap");

        body {
            margin: 0;
            font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
            background:
                radial-gradient(900px 500px at 10% -20%, #dbeafe 0%, transparent 55%),
                radial-gradient(700px 400px at 110% 10%, #ccfbf1 0%, transparent 45%),
                #f5f7fb;
            color: #0f172a;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.12);
            padding: 30px;
        }

        h1 {
            margin: 0 0 10px;
        }

        p {
            margin: 0 0 20px;
            color: #64748b;
            font-size: 14px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
        }

        input, button {
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
        }

        input {
            margin: 8px 0 14px;
        }

        button {
            background: #2563eb;
            border: none;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #1d4ed8;
        }

        .hint {
            margin-top: 14px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        {% block content %}{% endblock %}
    </div>
    {% block scripts %}{% endblock %}
</body>
</html>
