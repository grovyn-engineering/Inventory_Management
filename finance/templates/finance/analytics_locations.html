{% extends "base.html" %}

{% block title %}Analytics Locations{% endblock %}

{% block head_extra %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    .chart-card canvas {
        width: 100% !important;
        height: 340px !important;
        margin-top: 12px;
    }
</style>
{% endblock %}

{% block content %}
<section class="section-stack">
    <div class="card chart-card">
        <h3>Revenue by Location</h3>
        <div class="muted" id="locations_state">Loading...</div>
        <canvas id="locations_chart" style="display: none;"></canvas>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
let locationsChart = null;

function setChartState(text, showCanvas) {
    const state = document.getElementById("locations_state");
    const canvas = document.getElementById("locations_chart");
    state.textContent = text;
    state.style.display = showCanvas ? "none" : "block";
    canvas.style.display = showCanvas ? "block" : "none";
}

async function loadLocationsChart() {
    try {
        const response = await fetch("/api/analytics/location-revenue/", { credentials: "same-origin" });
        const payload = await response.json();
        if (!response.ok) {
            throw new Error(payload?.message || "Request failed.");
        }
        const rows = payload?.data || [];
        if (!rows.length) {
            setChartState("No location revenue data available.", false);
            return;
        }

        setChartState("", true);
        if (locationsChart) {
            locationsChart.destroy();
        }
        locationsChart = new Chart(document.getElementById("locations_chart"), {
            type: "bar",
            data: {
                labels: rows.map((row) => row.location),
                datasets: [{
                    label: "Revenue",
                    data: rows.map((row) => Number(row.revenue || 0)),
                    backgroundColor: "#0f766e"
                }]
            }
        });
    } catch (error) {
        setChartState("Unable to load location revenue.", false);
    }
}

loadLocationsChart();
</script>
{% endblock %}
