<!DOCTYPE html>
<html>
<head>
    <title>Refund Order</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; }
        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 { text-align:center; }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background: #6f4e37;
            color: white;
            border: none;
            cursor: pointer;
        }
        .result { margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Refund Order</h2>

    <input type="number" id="order_id" placeholder="Enter Order ID">

    <button onclick="refundOrder()">Refund</button>

    <div class="result" id="result"></div>
</div>

<script>
function refundOrder() {
    const orderId = document.getElementById("order_id").value;

    fetch("/finance/refund/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ order_id: orderId })
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);
        document.getElementById("result").innerText =
            data.message || data.error;
    })
    .catch(err => console.error(err));
}
</script>

</body>
</html>
