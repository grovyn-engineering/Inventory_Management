<!DOCTYPE html>
<html>
<head>
<title>Create Location</title>
<style>
body { font-family:'Segoe UI'; background:#f7f3ef; margin:0;}
.nav { background:#6f4e37; color:white; padding:15px;}
.container { max-width:600px; margin:40px auto;}
.card { background:white; padding:20px; border-radius:12px;}
input,button { width:100%; padding:10px; margin:10px 0; border-radius:8px;}
button { background:#6f4e37; color:white; border:none;}
</style>
</head>

<body>
<div class="nav">☕ Create Location</div>

<div class="container">
<div class="card">

<input id="name" placeholder="Location Name">
<button onclick="createLocation()">Create Location</button>

</div>
</div>

<script>
const token = localStorage.getItem('token');

async function createLocation(){
    const res = await fetch('/inventory/create-location/',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
        body:JSON.stringify({
            name: document.getElementById('name').value
        })
    });

    const data = await res.json();
    alert(data.message || data.error);
}
</script>
</body>
</html>
